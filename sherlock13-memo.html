<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シャーロック13 メモ｜コトノハ</title>
<style>
  :root {
    --bg: #faf6ef;
    --card: #fffdf8;
    --text: #3d2f24;
    --text-soft: #6b5a4a;
    --accent: #d97742;
    --accent-hover: #c2622d;
    --border: #e8dfd0;
    --shadow: 0 2px 12px rgba(61, 47, 36, 0.08);
    --out-bg: #e8e2d8;
    --out-text: #a8987e;
    --mark-bg: #1a365d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }
  header { text-align: center; margin: 0.5rem 0 1.2rem; }
  h1 { font-size: 1.25rem; font-weight: 700; }
  .sub { color: var(--text-soft); font-size: 0.82rem; margin-top: 0.2rem; }

  .legend {
    display: flex; justify-content: center; gap: 0.9rem;
    font-size: 0.75rem; color: var(--text-soft); margin-bottom: 1rem; flex-wrap: wrap;
  }
  .legend span { display: inline-flex; align-items: center; gap: 4px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .dot.candidate { background: var(--card); border: 2px solid var(--border); }
  .dot.out { background: var(--out-bg); border: 2px solid var(--out-bg); }
  .dot.mark { background: var(--mark-bg); }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.6rem;
    margin-bottom: 1.5rem;
  }
  .tile {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    padding: 0.6rem 0.5rem 0.5rem;
    text-align: center;
    user-select: none;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  }
  .tile .num {
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--text);
  }
  .tile .state {
    font-size: 0.7rem;
    color: var(--text-soft);
    margin-top: 2px;
    min-height: 1em;
  }
  .tile input {
    width: 100%;
    margin-top: 0.35rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(255,255,255,0.7);
    font-size: 0.72rem;
    text-align: center;
    padding: 3px 2px;
    color: var(--text);
  }
  .tile.out {
    background: var(--out-bg);
    border-color: var(--out-bg);
    opacity: 0.6;
  }
  .tile.out .num { text-decoration: line-through; color: var(--out-text); }
  .tile.mark {
    background: var(--mark-bg);
    border-color: var(--mark-bg);
  }
  .tile.mark .num { color: white; }
  .tile.mark .state { color: #cdd8e6; }
  .tile.mark input { background: rgba(255,255,255,0.15); color: white; }
  .tile.mark input::placeholder { color: rgba(255,255,255,0.5); }

  .actions {
    display: flex; gap: 0.6rem; margin-bottom: 1rem;
  }
  button.reset {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text-soft);
    border-radius: 8px;
    padding: 0.6rem;
    font-size: 0.85rem;
  }
  .howto {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    font-size: 0.8rem;
    color: var(--text-soft);
    line-height: 1.7;
    margin-bottom: 1rem;
  }
  .howto strong { color: var(--text); }
  .back { text-align: center; font-size: 0.85rem; }
</style>
</head>
<body>

<header>
  <h1>🔍 シャーロック13 メモ</h1>
  <div class="sub">カードをタップして候補を絞り込もう</div>
</header>

<div class="howto">
  タイルを<strong>タップ</strong>すると「候補 → 除外 → 犯人っぽい」の順で切り替わるよ。<br>
  下の小さい欄に、聞いたアイコン情報（例：パイプ○）をメモできるよ。
</div>

<div class="legend">
  <span><span class="dot candidate"></span>候補</span>
  <span><span class="dot out"></span>除外</span>
  <span><span class="dot mark"></span>犯人っぽい</span>
</div>

<div class="grid" id="grid"></div>

<div class="actions">
  <button class="reset" id="resetBtn">全部リセット</button>
</div>

<p class="back"><a href="info.html" style="color:var(--accent);">← リンク集にもどる</a></p>

<script>
  const N = 13;
  const grid = document.getElementById('grid');
  const STORAGE_KEY = 'sherlock13-memo-state';

  function load() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch (e) { return {}; }
  }
  function save(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  let state = load();

  function tileClass(s) {
    if (s === 1) return 'out';
    if (s === 2) return 'mark';
    return '';
  }
  function stateLabel(s) {
    if (s === 1) return '除外';
    if (s === 2) return '犯人っぽい';
    return '';
  }

  for (let i = 1; i <= N; i++) {
    const key = 'tile' + i;
    if (!state[key]) state[key] = { status: 0, note: '' };

    const tile = document.createElement('div');
    tile.className = 'tile ' + tileClass(state[key].status);
    tile.dataset.key = key;

    const num = document.createElement('div');
    num.className = 'num';
    num.textContent = i;

    const st = document.createElement('div');
    st.className = 'state';
    st.textContent = stateLabel(state[key].status);

    const input = document.createElement('input');
    input.type = 'text';
    input.placeholder = 'メモ';
    input.value = state[key].note;
    input.addEventListener('click', (e) => e.stopPropagation());
    input.addEventListener('input', (e) => {
      state[key].note = e.target.value;
      save(state);
    });

    tile.appendChild(num);
    tile.appendChild(st);
    tile.appendChild(input);

    tile.addEventListener('click', () => {
      state[key].status = (state[key].status + 1) % 3;
      tile.className = 'tile ' + tileClass(state[key].status);
      st.textContent = stateLabel(state[key].status);
      save(state);
    });

    grid.appendChild(tile);
  }

  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('全部リセットする？')) return;
    state = {};
    save(state);
    location.reload();
  });
</script>

</body>
</html>
